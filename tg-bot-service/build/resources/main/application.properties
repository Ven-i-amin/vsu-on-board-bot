spring.application.name=foreign_bot

telegram.bot.username=${TELEGRAM_BOT_NAME}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.webhookUri=${TELEGRAM_WEB_HOOK_PATH}

telegram.proxy.type=${TELEGRAM_PROXY_TYPE}
telegram.proxy.host=${TELEGRAM_PROXY_HOST}
telegram.proxy.port=${TELEGRAM_PROXY_PORT}
telegram.proxy.username=${TELEGRAM_PROXY_USERNAME}
telegram.proxy.password=${TELEGRAM_PROXY_PASSWORD}

redis.session.timespan=${SESSION_TIME_SPAN:120}
