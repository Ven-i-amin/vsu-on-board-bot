server:
  port: 443

spring:
  application:
    name: API-GATEWAY-SERVICE
  cloud:
    gateway:
      routes:
        - id: CORE-SERVICE
          uri: ${CORE_URI:http://localhost:8081}
          predicates:
            - Path=/api/**

        - id: TG-BOT
          uri: ${TG_BOT_URI:http://localhost:8082}
          predicates:
            - Path=/telegram/**