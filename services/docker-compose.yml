services:
  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
      tg-bot:
        condition: service_started
    ports:
      - "443:443"
    environment:
      API_GATEWAY_PORT: 443
      CORE_URI: http://core:8081
      TELEGRAM_BOT_MODE: ${TELEGRAM_BOT_MODE:-webhook}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_PATH: ${TELEGRAM_WEBHOOK_PATH:-/telegram/webhook}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TG_BOT_UPDATE_URI: http://tg-bot:8082/internal/telegram/updates
      TG_BOT_INTERNAL_TOKEN: ${TG_BOT_INTERNAL_TOKEN:-}

  mongo:
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" mongodb://localhost:27017/admin | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis_data:/data

  core:
    build:
      context: .
      dockerfile: ./core/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "8081:8081"
    environment:
      CORE_PORT: 8081
      MONGO_WAY: mongo
      MONGO_PORT: 27017
      MONGO_NAME: foreign_bot
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}

  tg-bot:
    build:
      context: .
      dockerfile: ./tg_bot/Dockerfile
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TG_BOT_PORT: 8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORE_BASE_URL: http://core:8081
      GATEWAY_BASE_URL: http://api-gateway:443
      TELEGRAM_BOT_MODE: gateway
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN}
      TG_BOT_INTERNAL_TOKEN: ${TG_BOT_INTERNAL_TOKEN:-}

volumes:
  mongo_data:
  redis_data:
