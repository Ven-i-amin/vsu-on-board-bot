server:
  port: ${API_GATEWAY_PORT:443}

spring:
  application:
    name: API-GATEWAY-SERVICE
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ROOT-REDIRECT
              uri: no://op
              predicates:
                - Path=/
              filters:
                - RedirectTo=302, /app
            - id: CORE-API-SERVICE
              uri: ${CORE_URI:http://localhost:8081}
              predicates:
                - Path=/api/**
            - id: CORE-ADMIN-SERVICE
              uri: ${CORE_URI:http://localhost:8081}
              predicates:
                - Path=/admin,/admin/**
            - id: CORE-APP-SERVICE
              uri: ${CORE_URI:http://localhost:8081}
              predicates:
                - Path=/app,/app/**
            - id: CORE-PUBLIC-API
              uri: ${CORE_URI:http://localhost:8081}
              predicates:
                - Path=/group/**,/question/**,/file/**,/languages/**
            - id: TG-BOT-WEBHOOK-SERVICE
              uri: ${TG_BOT_URI:http://localhost:8082}
              predicates:
                - Path=/telegram/**
